<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>ToDo Task</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="row">
        <form action="" class="formSection">
          <label for="task">Enter your Taks here : </label>
          <input type="text" name="task" id="task" />
          <button type="button" onclick="addTasks()">Add</button>
        </form>

        <div class="TaskStack">
          <div class="taskHeadNFilters">
            <h4>Your Tasks :</h4>
            <div class="filterWrapper">
              <select name="" id="filterStatus">
                <option value="" disabled selected>Filter</option>
                <option value="">All</option>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
              </select>
              <i class="fa-solid fa-filter" style="color: #673ab7"></i>
              <!-- <i class="fa-solid fa-arrow-down-short-wide"></i> -->
            </div>
          </div>
          <ul class="taskPlace">
            <!-- <li></li> -->
          </ul>

          <div>
            <div class="pagination">
              <button id="prev-btn">prev</button>
              <span id="pageInfo"></span>
              <button id="next-btn">next</button>
              <div class="limitWrapper">
                <label for="">Set Limit</label>
                <select name="" id="limitSelect">
                  <option value="5">5</option>
                  <option value="10">10</option>
                  <option value="15">15</option>
                  <option value="20">20</option>
                </select>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
